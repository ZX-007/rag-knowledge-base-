spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DATASOURCE_HOST}:${DATASOURCE_PORT}/ai-rag-knowledge-base
    type: com.zaxxer.hikari.HikariDataSource
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL}
    openai:
      base-url: ${OPENAI_BASE_URL}
      api-key: ${OPENAI_API_KEY}

redis:
  sdk:
    config:
      host: ${REDIS_HOST}
      port: ${REDIS_HOST}
      password: ${REDIS_HOST}
      pool-size: 10
      min-idle-size: 5
      idle-timeout: 30000
      connect-timeout: 5000
      retry-attempts: 3
      retry-interval: 1000
      ping-interval: 60000
      keep-alive: true

logging:
  level:
    root: warn
  config: classpath:logback-spring.xml